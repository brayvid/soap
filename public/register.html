<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - SOAP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-left">
      <a href="index.html">Home</a>
    </div>

    <div class="navbar-center">
      <span class="navbar-title">SOAP Political Polling</span>
    </div>
  </nav>

  <div class="container">
    <h2>Register</h2>
    <form id="register-form">
      <div class="form-group">
        <label for="username">Username</label><br />
        <input type="text" id="username" name="username" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="email">Email</label><br />
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label><br />
        <input type="password" id="password" name="password" required autocomplete="new-password" />
      </div>

      <button type="submit">Register</button>
    </form>
  </div>

  <footer class="footer">
    <p>&copy; 2025 Blake Rayvid. <a class="footer-link" href="mailto:info@soap.fyi">Contact</a></p>
  </footer>

  <script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('username')?.value.trim();
      const email = document.getElementById('email')?.value.trim();
      const password = document.getElementById('password')?.value;

      if (!username || !email || !password) {
        return alert('All fields are required.');
      }

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('token', data.token);
        window.location.href = 'index.html'; // ✅ redirect after successful register
      } else {
        alert(data.error || 'Registration failed.');
      }
    });
  </script>
</body>
</html>
