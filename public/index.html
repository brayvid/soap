<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAP Social Polling</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html">Home</a>
        <div class="navbar-title">SOAP Social Polling</div>
        <div class="spacer"></div> <!-- Spacer to balance the title -->
    </nav>

    <!-- Instructions Section -->
    <section id="instructions">
        <p><strong>Welcome to Soap, where you can see how the public describes politicians. Click on a politician to add your opinion.</strong></p>
    </section>

    <!-- Search and Filter Input -->
    <input type="text" id="filter-input" placeholder="Search for politicians..." onkeyup="filterTable()">

    <div id="bubble-chart-container">
  <div id="bubble-chart"></div>
</div>

<!-- Politicians Table -->
    <table id="politicians-table" class="sortable">
        <thead>
            <tr>
                <th>Name <span class="sort-arrow" onclick="sortTable(0)">⇅</span></th>
                <th>Position <span class="sort-arrow" onclick="sortTable(1)">⇅</span></th>
                <!-- Word columns will be dynamically added here -->
            </tr>
        </thead>
        <tbody id="politician-list">
            <!-- Rows will be dynamically added here -->
        </tbody>
    </table>
    <section id="add-politician">
        <h2>Add a New Politician</h2>
        <form id="add-politician-form">
            <input type="text" id="name" name="name" placeholder="Name" required />
            <input type="text" id="position" name="position" placeholder="Position" required />
            <button type="submit">Add Politician</button>
          </form>          
    </section>
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; Copyright 2024-2025 <a class="footer-link" href="https://soap.fyi">soap.fyi</a>. All rights reserved.</p>
    </footer>
    <script src="scripts.js" defer></script>
</body>
</html>
