<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAP: Political Polling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html">Home</a>
        <div class="navbar-title">SOAP: Political Polling</div>
        <div class="spacer"></div> <!-- Spacer to balance the title -->
    </nav>
    <!-- Search and Filter Input -->
    <input type="text" id="filter-input" placeholder="Search for politicians..." onkeyup="filterTable()">

    <!-- Politicians Table -->
    <table id="politicians-table" class="sortable">
        <thead>
            <tr>
                <th>Name <span class="sort-arrow" onclick="sortTable(0)">⇅</span></th>
                <th>Position <span class="sort-arrow" onclick="sortTable(1)">⇅</span></th>
                <!-- Word columns will be dynamically added here -->
            </tr>
        </thead>
        <tbody id="politician-list">
            <!-- Rows will be dynamically added here -->
        </tbody>
    </table>

    <h2>Add a New Politician</h2>
    <form id="add-politician-form">
        <label for="new-politician-name">Name:</label>
        <input type="text" id="new-politician-name" name="name" required>
        <br>
        <label for="new-politician-position">Position:</label>
        <input type="text" id="new-politician-position" name="position" required>
        <br>
        <button type="submit">Add Politician</button>
    </form>
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 <a class="footer-name" href="https://blakerayvid.com">Blake Rayvid</a></p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
