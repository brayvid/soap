<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAP: Political Polling</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="politician-name">Politician Name</h1>
            <p id="politician-position">Position</p>
        </header>

        <section id="votes-summary">
            <h2>Votes Summary</h2>
            <canvas id="votesChart" width="400" height="200"></canvas>
        </section>

        <section id="word-list">
            <h2>Vote on Words</h2>
            <ul id="words">
                <!-- Words and vote buttons will be dynamically added here -->
            </ul>
        </section>

        <section id="add-word">
            <h2>Add a New Word</h2>
            <form id="add-word-form">
                <label for="new-word">New Word:</label>
                <input type="text" id="new-word" name="new-word" required>
                <button type="submit">Add Word</button>
            </form>
        </section>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
