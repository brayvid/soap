<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAP: Political Polling</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html">Home</a>
        <div class="navbar-title">SOAP: Political Polling</div>
        <div class="spacer"></div> <!-- Spacer to balance the title -->
    </nav>
    <div class="container">
        <header>
            <h1 id="politician-name">Politician Name</h1>
            <p id="politician-position">Position</p>
        </header>

        <section id="votes-summary">
            <h2>Votes Summary</h2>
            <div id="chart-container" style="position: relative;">
                <canvas id="votesChart" width="400" height="68"></canvas>
                <div id="vote-buttons-container" class="vote-buttons-container"></div>
            </div>
        </section>

        <section id="add-word">
            <h2>Add a New Word</h2>
            <form id="add-word-form">
                <label for="new-word">New Word:</label>
                <input type="text" id="new-word" name="new-word" required>
                <button type="submit">Add Word</button>
            </form>
        </section>

    </div>
    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 <a class="footer-name" href="https://blakerayvid.com">Blake Rayvid</a></p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
